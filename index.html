<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ghorse Noir Engine</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#050505;
  --panel:rgba(8,7,6,0.92);
  --text:#f1e7d4;
  --gold:#e5c48a;
  --muted:#c9b99d;
  --green:#8de38d;
  --line:rgba(229,196,138,0.22);
  --blue:#9eb8d2;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,sans-serif;
  overflow-x:hidden;
}

.hero-stage{
  position:fixed;
  inset:0;
  min-height:100dvh;
  z-index:0;
  background:#050505;
  overflow:hidden;
}

.hero-layer{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center top;
  opacity:0;
  transition:opacity 0.85s ease;
}

.hero-layer.show{
  opacity:1;
}

.hero-stage::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:43vh;
  background:
    linear-gradient(
      to bottom,
      rgba(5,5,5,0),
      rgba(5,5,5,0.25),
      rgba(5,5,5,0.72),
      rgba(5,5,5,1)
    );
  z-index:3;
  pointer-events:none;
}

.intro-message{
  position:fixed;
  left:50%;
  bottom:5vh;
  transform:translateX(-50%);
  z-index:10;
  width:min(92vw,760px);
  color:rgba(255,255,255,0.88);
  font-size:clamp(12px,1.8vw,18px);
  font-weight:300;
  letter-spacing:0.12em;
  line-height:1.7;
  text-align:center;
  opacity:0;
  transition:opacity 1.4s ease;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
  pointer-events:none;
  white-space:normal;
}

.intro-message.show{
  opacity:1;
}

.content{
  position:relative;
  z-index:5;
  min-height:100vh;
  padding:44vh clamp(18px,5vw,48px) 48px;
  opacity:0;
  transform:translateY(20px);
  transition:
    opacity 1.2s ease,
    transform 1.2s ease;
}

.content.show{
  opacity:1;
  transform:translateY(0);
}

.brand{
  margin-bottom:24px;
  text-shadow:0 6px 24px rgba(0,0,0,0.9);
}

h1{
  margin:0 0 8px;
  font-size:clamp(42px,10vw,82px);
  line-height:1;
  letter-spacing:0.08em;
}

.subtitle{
  margin:0;
  color:var(--muted);
  font-size:clamp(14px,3vw,18px);
  letter-spacing:0.08em;
}

.panel{
  width:min(100%,780px);
  padding:clamp(18px,5vw,30px);
  border-radius:22px;
  background:var(--panel);
  border:1px solid var(--line);
  backdrop-filter:blur(10px);
  box-shadow:0 24px 80px rgba(0,0,0,0.65);
}

.section{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  color:var(--gold);
  font-size:13px;
  font-weight:bold;
  letter-spacing:0.12em;
}

select,
input,
textarea,
button{
  width:100%;
  padding:14px;
  border-radius:13px;
  border:1px solid rgba(229,196,138,0.14);
  background:rgba(16,14,13,0.95);
  color:white;
  font-size:16px;
  outline:none;
}

select:focus,
input:focus,
textarea:focus{
  border-color:rgba(229,196,138,0.6);
  box-shadow:0 0 0 3px rgba(229,196,138,0.1);
}

textarea{
  min-height:380px;
  resize:vertical;
  line-height:1.7;
  white-space:pre-wrap;
}

h3{
  margin-top:28px;
  padding-bottom:8px;
  border-bottom:1px solid var(--line);
  color:var(--gold);
}

pre{
  max-height:240px;
  overflow:auto;
  padding:14px;
  border-radius:14px;
  background:rgba(0,0,0,0.86);
  color:var(--green);
  font-size:12px;
}

button{
  cursor:pointer;
  background:
    linear-gradient(
      180deg,
      #4b321f,
      #24150d
    );
  color:#f8e9cc;
  font-weight:bold;
  letter-spacing:0.12em;
}

button:active{
  transform:scale(0.985);
}

button:disabled{
  opacity:0.35;
  cursor:not-allowed;
}

#copy-status{
  margin-top:12px;
  min-height:20px;
  color:var(--green);
}

.tarot-screen{
  position:fixed;
  inset:0;
  z-index:40;
  display:none;
  background:rgba(2,6,10,0.94);
  padding:18px;
  overflow:auto;
}

.tarot-screen.show{
  display:block;
}

.tarot-inner{
  width:min(100%,920px);
  margin:0 auto;
  min-height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding-top:18px;
  padding-bottom:24px;
}

.tarot-header{
  position:sticky;
  top:0;
  z-index:50;
  padding:10px 0 12px;
  background:
    linear-gradient(
      to bottom,
      rgba(2,6,10,0.98),
      rgba(2,6,10,0.92)
    );
  backdrop-filter:blur(8px);
}

.tarot-title{
  text-align:center;
  font-size:15px;
  font-weight:400;
  letter-spacing:0.18em;
  color:#dce7f1;
  margin:0 0 14px;
}

.tarot-subtitle{
  text-align:center;
  font-size:11px;
  color:rgba(220,230,240,0.72);
  letter-spacing:0.08em;
  margin-bottom:14px;
}

.tarot-desc-box{
  margin-top:12px;
  min-height:48px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(190,220,245,0.22);
  background:rgba(4,10,16,0.84);
  color:#dce7f1;
  font-size:12px;
  line-height:1.7;
  text-align:center;
}

.tarot-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding-top:12px;
}

.tarot-card{
  aspect-ratio:0.72;
  border-radius:14px;
  border:1px solid rgba(190,220,245,0.32);

  background:
    radial-gradient(
      circle at 50% 20%,
      rgba(130,170,205,0.14),
      transparent 36%
    ),
    rgba(8,18,28,0.94);

  color:#dce7f1;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:7px;

  position:relative;
  overflow:hidden;
  cursor:pointer;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.04);
}

.tarot-card::before{
  content:"";
  position:absolute;
  inset:8px;
  border:1px solid rgba(210,230,245,0.24);
  border-radius:10px;
  pointer-events:none;
}

.tarot-card.active{
  border-color:rgba(230,245,255,0.95);

  box-shadow:
    0 0 20px rgba(160,210,255,0.35),
    inset 0 0 0 1px rgba(255,255,255,0.12);
}

.tarot-icon{
  font-size:clamp(22px,6vw,38px);
  opacity:0.72;
  filter:grayscale(1);
}

.tarot-jp{
  font-size:11px;
  letter-spacing:0.02em;
  color:#d9e1e8;
}

.tarot-en{
  font-size:10px;
  letter-spacing:0.08em;
  color:rgba(190,215,235,0.78);
}

.tarot-info{
  margin-top:14px;
  text-align:center;
  color:#cfdcea;
  font-size:12px;
  line-height:1.7;
}

.tarot-actions{
  margin-top:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.processing-screen{
  position:fixed;
  inset:0;
  z-index:80;
  display:none;
  background:#000;
  overflow:hidden;
}

.processing-screen.show{
  display:block;
}

.processing-layer{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center center;
  opacity:0;
  transition:opacity 1s ease;
}

.processing-layer.show{
  opacity:1;
}

.processing-fade{
  position:absolute;
  inset:0;
  background:#000;
  opacity:0;
  transition:opacity 3s ease;
  z-index:3;
}

.processing-fade.show{
  opacity:1;
}

.processing-message{
  position:absolute;
  left:50%;
  bottom:calc(5vh - 3px);
  transform:translateX(-50%);
  z-index:5;
  width:min(92vw,760px);
  color:rgba(255,255,255,0.92);
  text-shadow:0 2px 14px rgba(0,0,0,0.95);
  letter-spacing:0.1em;
  line-height:1.8;
  text-align:center;
  opacity:0;
  transition:opacity 1s ease;
  white-space:normal;
}

.processing-message.show{
  opacity:1;
}

.final-copy{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:10vh;
  width:min(92vw,700px);
  z-index:6;
  opacity:0;
  transition:opacity 1s ease;
}

.final-copy.show{
  opacity:1;
}

@media (min-width:769px){

  .tarot-grid{
    grid-template-columns:repeat(5,1fr);
    gap:14px;
  }

  .tarot-card{
    max-height:180px;
  }
}

@media (max-width:768px){

  .content{
    padding-top:42vh;
  }

  textarea{
    min-height:430px;
    font-size:15px;
  }

  pre{
    font-size:11px;
  }

  .tarot-inner{
    min-height:auto;
    display:block;
  }

  .tarot-header{
    top:0;
  }

  .tarot-grid{
    padding-bottom:16px;
  }

  .processing-message{
    bottom:calc(5vh - 3px);
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="hero-stage">

  <div
    class="hero-layer"
    id="hero-layer-a"
  ></div>

  <div
    class="hero-layer"
    id="hero-layer-b"
  ></div>

</div>

<div
  class="intro-message"
  id="intro-message"
>
――で、今日はどんな脚本を？
</div>

<main
  class="content"
  id="content"
>

<div class="brand">

  <h1>Ghorse</h1>

  <p class="subtitle">
    Ghost Writer / Noir Story Engine
  </p>

<div class="panel">

<div class="section">

<label>GENRE</label>

<select id="genre">

<option value="">

<option value="mystery">
  Mystery
</option>

<input

<div class="section">

<select id="gender">

<textarea

</div>

</div>

</main>

<section
  class="tarot-screen"
  id="tarot-screen"
>

<div class="tarot-inner">

<div class="tarot-header">

<h2 class="tarot-title">
  駆動要素を4つ選択
</h2>

<div class="tarot-subtitle">
  DRIVE CARDS / SELECT 4
</div>

<div
  class="tarot-desc-box"

>
  カードに触れると説明が表示されます
</div>

</div>

<div
  class="tarot-grid"
  id="tarot-grid"
></div>

<div
  class="tarot-info"
  id="tarot-info"
>
  0 / 4 SELECTED
</div>

<div class="tarot-actions">

<button id="tarot-close">
  BACK
</button>

<button
  id="tarot-next"

>
  DONE
</button>

</div>

</div>

</section>

<section
  class="processing-screen"
  id="processing-screen"
>

<div
  class="processing-layer"
  id="processing-layer-a"
></div>

<div
  class="processing-layer"
  id="processing-layer-b"
></div>

<div
  class="processing-fade"
  id="processing-fade"
></div>

<div
  class="processing-message"
  id="processing-message"
></div>

<div
  class="final-copy"
  id="final-copy"
>

<button id="final-copy-button">
  COPY PROMPT
</button>

</div>

</section>

<script>
const layerA =
document.getElementById("hero-layer-a");

const layerB =
document.getElementById("hero-layer-b");

const introMessage =
document.getElementById("intro-message");

const content =
document.getElementById("content");

const isMobile =
window.innerWidth <= 768;

const slides = isMobile
  ? [
      "./intro-mobile-1.webp",
      "./intro-mobile-2.webp",
      "./intro-mobile-3.webp"
    ]
  : [
      "./intro-pc-1.webp",
      "./intro-pc-2.webp",
      "./intro-pc-3.webp"
    ];

let activeLayer = layerA;
let inactiveLayer = layerB;
let currentSlide = 0;

function setLayerImage(layer,src){

  layer.style.backgroundImage =
  `url("${src}")`;
}

setLayerImage(activeLayer,slides[0]);

setTimeout(()=>{

  activeLayer.classList.add("show");

},300);

function crossFadeTo(index){

  setLayerImage(
    inactiveLayer,
    slides[index]
  );

  inactiveLayer.classList.add("show");

  activeLayer.classList.remove("show");

  const temp = activeLayer;

  activeLayer = inactiveLayer;
  inactiveLayer = temp;
}

const slideTimer = setInterval(()=>{

  currentSlide++;

  if(currentSlide >= slides.length){

    clearInterval(slideTimer);

    setTimeout(()=>{

      content.classList.add("show");
      introMessage.classList.add("show");

    },300);

    setTimeout(()=>{

      introMessage.classList.remove("show");

    },5200);

    return;
  }

  crossFadeTo(currentSlide);

},1500);

const state = {

  genre:"",
  character:"",
  age:"",
  gender:"",
  drive:"",

  selectedDrives:[],

  descriptionPlan:[],
  syntaxPlan:[]
};

const driveCards = [

  {
    id:"quest",
    jp:"探求",
    en:"Quest",
    icon:"🔍",
    desc:"何かを求めて進む"
  },

  {
    id:"escape",
    jp:"逃避",
    en:"Escape",
    icon:"🏃",
    desc:"何かから逃げる"
  },

  {
    id:"survival",
    jp:"生存",
    en:"Survival",
    icon:"〽",
    desc:"生き延びる"
  },

  {
    id:"revenge",
    jp:"復讐",
    en:"Revenge",
    icon:"✊",
    desc:"失われたものを取り戻す"
  },

  {
    id:"system",
    jp:"組織",
    en:"System",
    icon:"▥",
    desc:"巨大な力に抗う"
  },

  {
    id:"belonging",
    jp:"所属",
    en:"Belonging",
    icon:"●●●",
    desc:"居場所を求める"
  },

  {
    id:"transform",
    jp:"変容",
    en:"Transform",
    icon:"🦋",
    desc:"自分自身が変わる"
  },

  {
    id:"truth",
    jp:"真実",
    en:"Truth",
    icon:"◉",
    desc:"隠された事実を知る"
  },

  {
    id:"memory",
    jp:"記憶",
    en:"Memory",
    icon:"◌",
    desc:"過去を取り戻す"
  },

  {
    id:"journey",
    jp:"巡礼",
    en:"Journey",
    icon:"⌁",
    desc:"旅そのものが目的になる"
  },

  {
    id:"desire",
    jp:"禁忌",
    en:"Desire",
    icon:"♡",
    desc:"許されない願望を求める"
  },

  {
    id:"sacrifice",
    jp:"犠牲",
    en:"Sacrifice",
    icon:"✝",
    desc:"何かを捨てて守る"
  },

  {
    id:"redemption",
    jp:"贖罪",
    en:"Redemption",
    icon:"♢",
    desc:"過去の罪を償う"
  },

  {
    id:"corruption",
    jp:"堕落",
    en:"Corruption",
    icon:"◑",
    desc:"良いものが壊れていく"
  },

  {
    id:"break",
    jp:"断絶",
    en:"Break",
    icon:"⛓",
    desc:"繰り返しを断ち切る"
  }
];

const genreEl =
document.getElementById("genre");

const characterEl =
document.getElementById("character");

const ageEl =
document.getElementById("age");

const genderEl =
document.getElementById("gender");

const driveEl =
document.getElementById("drive");

const stateView =
document.getElementById("state-view");

const promptOutput =
document.getElementById("prompt-output");

const copyButton =
document.getElementById("copy-button");

const copyStatus =
document.getElementById("copy-status");

const openTarotButton =
document.getElementById("open-tarot-button");

const tarotScreen =
document.getElementById("tarot-screen");

const tarotGrid =
document.getElementById("tarot-grid");

const tarotInfo =
document.getElementById("tarot-info");

const tarotClose =
document.getElementById("tarot-close");

const tarotNext =
document.getElementById("tarot-next");

const tarotDescBox =
document.getElementById("tarot-desc-box");

const processingScreen =
document.getElementById("processing-screen");

const processingLayerA =
document.getElementById("processing-layer-a");

const processingLayerB =
document.getElementById("processing-layer-b");

const processingFade =
document.getElementById("processing-fade");

const processingMessage =
document.getElementById("processing-message");

const finalCopy =
document.getElementById("final-copy");

const finalCopyButton =
document.getElementById("final-copy-button");

function randomPick(arr){

  return arr[
    Math.floor(
      Math.random() * arr.length
    )
  ];
}

function weightedDescriptionRandom(section){

  if(section === "jo"){

    return randomPick([
      "scenery",
      "scenery",
      "object",
      "psychology",
      "action"
    ]);
  }

  if(section === "ha"){

    return randomPick([
      "action",
      "action",
      "psychology",
      "dialogue",
      "object"
    ]);
  }

  return randomPick([
    "psychology",
    "action",
    "action",
    "dialogue",
    "scenery"
  ]);
}

function weightedSyntaxRandom(section){

  if(section === "jo"){

    return randomPick([
      "sov",
      "sov",
      "nounlead",
      "nounlead",
      "simple"
    ]);
  }

  if(section === "ha"){

    return randomPick([
      "delayed",
      "delayed",
      "dialogue",
      "sov",
      "simple"
    ]);
  }

  return randomPick([
    "simple",
    "simple",
    "delayed",
    "sov",
    "nounlead"
  ]);
}

function getSectionByLine(line){

  if(line <= 5){
    return "jo";
  }

  if(line <= 11){
    return "ha";
  }

  return "kyu";
}

function generateDescriptionPlan(){

  state.descriptionPlan = [];

  for(let i=1;i<=16;i++){

    const section =
    getSectionByLine(i);

    state.descriptionPlan.push({

      line:i,

      type:
      weightedDescriptionRandom(section)
    });
  }
}

function generateSyntaxPlan(){

  state.syntaxPlan = [];

  for(let i=1;i<=16;i++){

    const section =
    getSectionByLine(i);

    state.syntaxPlan.push({

      line:i,

      type:
      weightedSyntaxRandom(section)
    });
  }
}

function buildPrompt(){

  const genre =
  state.genre || "未設定";

  const character =
  state.character || "未設定";

  const age =
  state.age || "未設定";

  const gender =
  state.gender || "未設定";

  const drive =
  state.drive || "未設定";

  const selectedText =

  state.selectedDrives

    .map(id =>
      driveCards.find(
        card => card.id === id
      )
    )

    .filter(Boolean)

    .map(card =>
      `${card.jp} / ${card.en}: ${card.desc}`
    )

    .join("\n")

    || "未設定";

  let linePlanText = "";

  for(let i=0;i<16;i++){

    const description =
    state.descriptionPlan[i]?.type
    || "未設定";

    const syntax =
    state.syntaxPlan[i]?.type
    || "未設定";

    linePlanText +=
    `${i+1}: ${description} / ${syntax}\n`;
  }

  return `あなたは日本語の物語生成エンジンです。

以下の条件に従って、
16行の物語テキストを生成してください。

【基本設定】
GENRE: ${genre}
CHARACTER: ${character}
AGE: ${age}
GENDER: ${gender}
DRIVE: ${drive}

【選択された駆動要素】
${selectedText}

【出力ルール】

}

function render(){

  stateView.textContent =
  JSON.stringify(state,null,2);

  promptOutput.value =
  buildPrompt();
}

function renderTarot(){

  tarotGrid.innerHTML = "";

  driveCards.forEach(card=>{

    const button =
    document.createElement("button");

    button.type = "button";

    button.className =
    "tarot-card";

    if(
      state.selectedDrives.includes(card.id)
    ){
      button.classList.add("active");
    }

    button.innerHTML = `

      <div class="tarot-icon">
        ${card.icon}
      </div>

      <div class="tarot-jp">
        ${card.jp}
      </div>

      <div class="tarot-en">
        ${card.en}
      </div>

    `;

    button.addEventListener(
      "mouseenter",
      ()=>{

        tarotDescBox.textContent =
        `${card.jp} / ${card.en}：${card.desc}`;
      }
    );

    button.addEventListener(
      "focus",
      ()=>{

        tarotDescBox.textContent =
        `${card.jp} / ${card.en}：${card.desc}`;
      }
    );

    button.addEventListener(
      "touchstart",
      ()=>{

        tarotDescBox.textContent =
        `${card.jp} / ${card.en}：${card.desc}`;

      },
      {passive:true}
    );

    button.addEventListener(
      "click",
      ()=>{

        const exists =
        state.selectedDrives.includes(card.id);

        if(exists){

          state.selectedDrives =
          state.selectedDrives.filter(
            id => id !== card.id
          );

        }else{

          if(
            state.selectedDrives.length >= 4
          ){
            return;
          }

          state.selectedDrives.push(card.id);
        }

        renderTarot();
        render();
      }
    );

    tarotGrid.appendChild(button);
  });

  const selectedNames =

  state.selectedDrives

    .map(id =>
      driveCards.find(
        card => card.id === id
      )
    )

    .filter(Boolean)

    .map(card => card.jp)

    .join(" / ");

  tarotInfo.textContent =

  selectedNames

    ? `${state.selectedDrives.length} / 4 SELECTED：${selectedNames}`

    : "0 / 4 SELECTED";

  tarotNext.disabled =
  state.selectedDrives.length !== 4;
}

let processingActive =
processingLayerA;

let processingInactive =
processingLayerB;

function processingSwap(src){

  processingInactive.style.backgroundImage =
  `url("${src}")`;

  processingInactive.classList.add("show");

  processingActive.classList.remove("show");

  const temp = processingActive;

  processingActive =
  processingInactive;

  processingInactive =
  temp;
}

function runProcessingSequence(){

  tarotScreen.classList.remove("show");

  processingScreen.classList.add("show");

  const processingSlides = isMobile

    ? [
        "./scene-mobile-a.webp",
        "./scene-mobile-b.webp",
        "./scene-mobile-c.webp",
        "./scene-mobile-d.webp",
        "./scene-mobile-e.webp"
      ]

    : [
        "./scene-pc-a.webp",
        "./scene-pc-b.webp",
        "./scene-pc-c.webp",
        "./scene-pc-d.webp",
        "./scene-pc-e.webp"
      ];

  const finalScene = isMobile

    ? "./scene-mobile-f.webp"

    : "./scene-pc-f.webp";

  processingActive.style.backgroundImage =
  `url("${processingSlides[0]}")`;

  processingActive.classList.add("show");

  processingMessage.textContent =
  "ちょっと待ってな";

  processingMessage.classList.add("show");

  finalCopy.classList.remove("show");

  processingFade.classList.remove("show");

  let index = 0;

  const dots = [
    "",
    ".",
    "..",
    "..."
  ];

  const timer = setInterval(()=>{

    index++;

    if(index >= processingSlides.length){

      clearInterval(timer);

      processingFade.classList.add("show");

      setTimeout(()=>{

        processingSwap(finalScene);

        processingFade.classList.remove("show");

        processingMessage.innerHTML =
        `はいよ。<br>いつも通り、<br>アタシのことは言うんじゃないよ。`;

        finalCopy.classList.add("show");

      },3000);

      return;
    }

    processingSwap(
      processingSlides[index]
    );

    if(index >= 1 && index <= 3){

      processingMessage.textContent =
      "ちょっと待ってな" + dots[index];
    }

  },1000);
}

tarotNext.addEventListener(
  "click",
  ()=>{

    runProcessingSequence();
  }
);

copyButton.addEventListener(
  "click",
  async()=>{

    try{

      await navigator.clipboard.writeText(
        promptOutput.value
      );

      copyStatus.textContent =
      "PROMPT COPIED";

    }catch(error){

      promptOutput.select();

      copyStatus.textContent =
      "コピーできませんでした";
    }

    setTimeout(()=>{

      copyStatus.textContent = "";

    },1600);
  }
);

  async()=>{

        promptOutput.value
      );

    }catch(error){
      return;
    }

    finalCopy.classList.remove("show");

    processingScreen.classList.remove("show");

    content.classList.add("show");

    processingActive.style.backgroundImage =
    `url("${
      isMobile
        ? "./scene-mobile-f.webp"
        : "./scene-pc-f.webp"
    }")`;

    processingActive.classList.add("show");
  }
);
