<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Ghorse Noir Engine</title>

  <style>
    body{
      margin:0;
      background:#050505;
      color:#f1e7d4;
      font-family:sans-serif;
    }

    .hero{
      min-height:100vh;
      background-image:
      linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.92)),
      url("./ghorse-hero.png");
      background-size:cover;
      background-position:center;
      padding:40px;
      box-sizing:border-box;
    }

    h1{
      font-size:48px;
      margin-bottom:8px;
    }

    .panel{
      margin-top:32px;
      background:rgba(0,0,0,0.68);
      padding:24px;
      border-radius:16px;
      max-width:720px;
      backdrop-filter:blur(6px);
    }

    .section{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#e5c48a;
    }

    select,
    input,
    textarea{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      font-size:16px;
      box-sizing:border-box;
    }

    textarea{
      min-height:260px;
      line-height:1.6;
      resize:vertical;
      white-space:pre-wrap;
    }

    pre{
      background:#111;
      padding:16px;
      border-radius:12px;
      overflow:auto;
      color:#8de38d;
      font-size:13px;
    }

    .output-title{
      margin-top:32px;
      color:#e5c48a;
    }
  </style>
</head>

<body>

<div class="hero">

  <h1>Ghorse</h1>
  <p>Ghost Writer / Noir Story Engine</p>

  <div class="panel">

    <div class="section">
      <label>GENRE</label>
      <select id="genre">
        <option value="">選択してください</option>
        <option value="noir">Noir</option>
        <option value="cyberpunk">Cyberpunk</option>
        <option value="melancholy">Melancholy</option>
      </select>
    </div>

    <div class="section">
      <label>CHARACTER</label>
      <input id="character" type="text" placeholder="Ghorse">
    </div>

    <div class="section">
      <label>DRIVE</label>
      <input id="drive" type="text" placeholder="revenge / escape / salvation">
    </div>

    <h3>STATE</h3>
    <pre id="state-view"></pre>

    <h3 class="output-title">PROMPT OUTPUT</h3>
    <textarea id="prompt-output" readonly></textarea>

  </div>

</div>

<script>

const state = {
  genre:"",
  character:"",
  drive:""
};

const genreEl = document.getElementById("genre");
const characterEl = document.getElementById("character");
const driveEl = document.getElementById("drive");
const stateView = document.getElementById("state-view");
const promptOutput = document.getElementById("prompt-output");

function buildPrompt(){

  const genre =
  state.genre || "未設定";

  const character =
  state.character || "未設定";

  const drive =
  state.drive || "未設定";

  return `あなたは日本語の物語生成エンジンです。

以下の条件に従って、物語性のある日本語テキストを生成してください。

【基本設定】
GENRE: ${genre}
CHARACTER: ${character}
DRIVE: ${drive}

【生成方針】
・単なる説明文ではなく、情景、行動、感情の推移を持つ文章にする。
・抽象語だけで進めず、具体的な物・場所・動作を必ず入れる。
・主人公の動機が読者に伝わるようにする。
・雰囲気はジャンル設定に合わせる。
・文体は硬すぎず、映像的で余韻のあるものにする。

【出力形式】
16行前後の日本語テキストとして出力してください。`;

}

function render(){

  stateView.textContent =
  JSON.stringify(state,null,2);

  promptOutput.value =
  buildPrompt();

}

genreEl.addEventListener("change",()=>{
  state.genre = genreEl.value;
  render();
});

characterEl.addEventListener("input",()=>{
  state.character = characterEl.value;
  render();
});

driveEl.addEventListener("input",()=>{
  state.drive = driveEl.value;
  render();
});

render();

</script>

</body>
</html>
