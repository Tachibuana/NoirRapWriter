<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Ghorse Noir Engine</title>

  <style>
    body{
      margin:0;
      background:#050505;
      color:#f1e7d4;
      font-family:sans-serif;
    }

    .hero{
      min-height:100vh;
      background-image:
      linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.92)),
      url("./ghorse-hero.png");
      background-size:cover;
      background-position:center;
      padding:40px;
      box-sizing:border-box;
    }

    h1{
      font-size:48px;
      margin-bottom:8px;
    }

    .panel{
      margin-top:32px;
      background:rgba(0,0,0,0.68);
      padding:24px;
      border-radius:16px;
      max-width:720px;
      backdrop-filter:blur(6px);
    }

    .section{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#e5c48a;
    }

    select,
    input,
    textarea{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      font-size:16px;
      box-sizing:border-box;
    }

    textarea{
      min-height:260px;
      line-height:1.6;
      resize:vertical;
      white-space:pre-wrap;
    }

    pre{
      background:#111;
      padding:16px;
      border-radius:12px;
      overflow:auto;
      color:#8de38d;
      font-size:13px;
    }

    .output-title{
      margin-top:32px;
      color:#e5c48a;
    }
  </style>
</head>

<body>

<div class="hero">

  <h1>Ghorse</h1>
  <p>Ghost Writer / Noir Story Engine</p>

  <div class="panel">

    <div class="section">
      <label>GENRE</label>
      <select id="genre">
        <option value="">選択してください</option>
        <option value="noir">Noir</option>
        <option value="cyberpunk">Cyberpunk</option>
        <option value="melancholy">Melancholy</option>
        <option value="noir">Noir</option>
<option value="crime">Crime</option>
<option value="mystery">Mystery</option>
<option value="postapocalypse">Post Apocalypse</option>
<option value="urbanfantasy">Urban Fantasy</option>
<option value="scifi">Sci-Fi</option>
<option value="tragedy">Tragedy</option>
<option value="dreamcore">Dreamcore</option>
      </select>
    </div>

    <div class="section">
      <label>CHARACTER</label>
      <input id="character" type="text" placeholder="Ghorse">
    </div>

    <div class="section">
      <div class="section">
  <label>AGE</label>

  <input
  id="age"
  type="number"
  placeholder="24">
</div>

<div class="section">
  <label>GENDER</label>

  <select id="gender">

    <option value="">
    選択してください
    </option>

    <option value="female">
    Female
    </option>

    <option value="male">
    Male
    </option>

    <option value="other">
    Other
    </option>

  </select>
</div>
      <label>DRIVE</label>
      <input id="drive" type="text" placeholder="revenge / escape / salvation">
    </div>

    <h3>STATE</h3>
    <pre id="state-view"></pre>

    <h3 class="output-title">PROMPT OUTPUT</h3>
    <textarea id="prompt-output" readonly></textarea>

  </div>

</div>

<script>

const state = {

  genre:"",
  character:"",
  age:"",
  gender:"",
  drive:"",

  descriptionPlan:[],
  syntaxPlan:[]

};

const genreEl =
document.getElementById("genre");

const characterEl =
document.getElementById("character");

const driveEl =
document.getElementById("drive");

const stateView =
document.getElementById("state-view");

const promptOutput =
document.getElementById("prompt-output");

const descriptionTypes = [

  "action",
  "scenery",
  "psychology",
  "dialogue",
  "object"

];

const syntaxTypes = [

  "sov",
  "nounlead",
  "delayed",
  "dialogue",
  "simple"

];

function weightedRandom(section){

  if(section === "jo"){

    return randomPick([
      "scenery",
      "scenery",
      "object",
      "psychology",
      "action"
    ]);

  }

  if(section === "ha"){

    return randomPick([
      "action",
      "action",
      "psychology",
      "dialogue",
      "object"
    ]);

  }

  return randomPick([
    "psychology",
    "action",
    "action",
    "dialogue",
    "scenery"
  ]);

}

function randomPick(arr){

  return arr[
    Math.floor(
      Math.random() * arr.length
    )
  ];

}

function generateDescriptionPlan(){

  const lines = 16;

  state.descriptionPlan = [];

  for(let i = 1; i <= lines; i++){

    let section = "jo";

    if(i >= 6 && i <= 11){

      section = "ha";

    }

    if(i >= 12){

      section = "kyu";

    }

    state.descriptionPlan.push({

      line:i,
      type:weightedRandom(section)

    });

  }

}

function buildPrompt(){

  const genre =
  state.genre || "未設定";

  const character =
  state.character || "未設定";

  const ageEl =
  document.getElementById("age");

  const genderEl =
  document.getElementById("gender");

  const drive =
  state.drive || "未設定";

  let linePlanText = "";

for(let i = 0; i < 16; i++){

  const description =
  state.descriptionPlan[i]?.type || "未設定";

  const syntax =
  state.syntaxPlan[i]?.type || "未設定";

  linePlanText +=
  `${i + 1}: ${description} / ${syntax}\n`;

}

  return `あなたは日本語の物語生成エンジンです。

以下の条件に従って、
16行の物語テキストを生成してください。

【基本設定】
GENRE: ${genre}
CHARACTER: ${character}
AGE: ${state.age || "未設定"}
GENDER: ${state.gender || "未設定"}
DRIVE: ${drive}

【出力ルール】
・必ず1行ごとに改行する
・全16行で出力する
・具体描写を優先する
・抽象語だけで進めない
・情景、感情、行動を含める

【行別設計】
${linePlanText}

`;

}

function render(){

  stateView.textContent =
  JSON.stringify(state,null,2);

  promptOutput.value =
  buildPrompt();

}

genreEl.addEventListener("change",()=>{

  state.genre =
  genreEl.value;

  generateDescriptionPlan();

  render();

});

characterEl.addEventListener("input",()=>{

  state.character =
  characterEl.value;

  render();

});

  ageEl.addEventListener("input",()=>{

  state.age =
  ageEl.value;

  render();

});

genreEl.addEventListener("change",()=>{

  state.genre =
  genreEl.value;

  generateDescriptionPlan();
  generateSyntaxPlan();

  render();

});

driveEl.addEventListener("input",()=>{

  state.drive =
  driveEl.value;

  render();

});

generateDescriptionPlan();
generateSyntaxPlan();

render();

function weightedSyntaxRandom(section){

  if(section === "jo"){

    return randomPick([
      "sov",
      "sov",
      "nounlead",
      "nounlead",
      "simple"
    ]);

  }

  if(section === "ha"){

    return randomPick([
      "delayed",
      "delayed",
      "dialogue",
      "sov",
      "simple"
    ]);

  }

  return randomPick([
    "simple",
    "simple",
    "delayed",
    "sov",
    "nounlead"
  ]);

}

function generateSyntaxPlan(){

  const lines = 16;

  state.syntaxPlan = [];

  for(let i = 1; i <= lines; i++){

    let section = "jo";

    if(i >= 6 && i <= 11){
      section = "ha";
    }

    if(i >= 12){
      section = "kyu";
    }

    state.syntaxPlan.push({
      line:i,
      type:weightedSyntaxRandom(section)
    });

  }

}

render();

</script>

</body>
</html>
