*{box-sizing:border-box}

:root{
  --bg:#050505;
  --panel:rgba(8,7,6,0.92);
  --text:#f1e7d4;
  --gold:#e5c48a;
  --muted:#c9b99d;
  --green:#8de38d;
  --line:rgba(229,196,138,0.22);
  --blue:#9eb8d2;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,sans-serif;
  overflow-x:hidden;
}

.hero-stage{
  position:fixed;
  inset:0;
  min-height:100dvh;
  z-index:0;
  background:#050505;
  overflow:hidden;
}

.hero-layer{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center top;
  opacity:0;
  transition:opacity 0.85s ease;
}

.hero-layer.show{opacity:1}

.hero-stage::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:43vh;
  background:linear-gradient(to bottom,rgba(5,5,5,0),rgba(5,5,5,0.25),rgba(5,5,5,0.72),rgba(5,5,5,1));
  z-index:3;
  pointer-events:none;
}

.intro-message{

  z-index:10;
  color:rgba(255,255,255,0.88);

}

.intro-message.show{opacity:1}

}

.content.show{
  opacity:1;
  transform:translateY(0);
}

}

  letter-spacing:0.08em;
}
