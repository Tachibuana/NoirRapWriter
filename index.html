<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghorse Noir Engine</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f2eadf;
      font-family: system-ui, sans-serif;
    }

    .hero {
      width: 100%;
      min-height: 100vh;
      background-image:
        linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.85)),
        url("./ghorse-hero.png");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
    }

    .hero-text {
      padding: 32px;
      max-width: 720px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 5rem);
      letter-spacing: 0.08em;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      color: #d4c4ad;
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-text">
      <h1>Ghorse</h1>
      <p>Ghost Writer / Noir Story Generation Engine</p>
    </div>
  </section>
</body>
</html>
